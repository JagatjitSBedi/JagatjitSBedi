name: Build Gallery APK
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: git clone -q https://github.com/google-ai-edge/gallery.git upstream_repo
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Setup Environment Variables
        run: |
          GRADLE_DIR="upstream_repo/Android/src"
          echo "GRADLE_DIR=$GRADLE_DIR" >> "$GITHUB_ENV"
          SERVICE_DIR="$GRADLE_DIR/app/src/main/java/com/google/ai/edge/gallery"
          echo "SERVICE_DIR=$SERVICE_DIR" >> "$GITHUB_ENV"
          MANIFEST_PATH="$GRADLE_DIR/app/src/main/AndroidManifest.xml"
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> "$GITHUB_ENV"
      - name: Inject Isolated Multi-Process Service
        run: |
          cat << 'KOTLIN_EOF' > ${{ env.SERVICE_DIR }}/HeadlessNpuService.kt
          package com.google.ai.edge.gallery
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.os.IBinder
          import android.util.Log
          import androidx.core.app.NotificationCompat
          import com.google.ai.edge.litertlm.*
          import java.io.File
          import java.util.concurrent.Executors
          
          class HeadlessNpuService : Service() {
              private var engine: Engine? = null
              private var activeConversation: Conversation? = null
              private val hardwareExecutor = Executors.newSingleThreadExecutor()
              private val outputPath = "/sdcard/Android/data/com.google.aiedge.gallery/files/omni_response.json"
              private val modelPath = "/sdcard/Android/data/com.google.aiedge.gallery/files/Gemma_4_E4B_it/9695417f248178c63a9f318c6e0c56cb917cb837/gemma-4-E4B-it.litertlm"
              
              override fun onCreate() {
                  super.onCreate()
                  val channelId = "npu_daemon_worker"
                  val channel = NotificationChannel(channelId, "NPU Isolated Worker", NotificationManager.IMPORTANCE_LOW)
                  getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                  startForeground(1337, NotificationCompat.Builder(this, channelId).setContentTitle("HeavyNet IPC").setContentText("Isolated Process Active.").setSmallIcon(android.R.drawable.ic_dialog_info).build())
              }
              
              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val prompt = intent?.getStringExtra("HEAVYNET_PROMPT") ?: return START_NOT_STICKY
                  hardwareExecutor.execute {
                      File(outputPath).delete()
                      try {
                          if (engine == null) {
                              Log.i("HEAVYNET_DAEMON", "Initiating Mali-G77 Map (Isolated PID)...")
                              val config = EngineConfig(modelPath = modelPath, backend = Backend.GPU(), maxNumTokens = 1024)
                              val tempEngine = Engine(config)
                              tempEngine.initialize() 
                              engine = tempEngine
                              Log.i("HEAVYNET_DAEMON", "Hardware Locks Acquired Successfully.")
                          }
                          
                          // STRICT MEMORY MANAGEMENT: Flush C++ pointer before creating new session
                          activeConversation?.close()
                          activeConversation = engine!!.createConversation()
                          
                          val response = activeConversation!!.sendMessage(prompt)
                          File(outputPath).writeText("{\"status\":\"success\", \"response\":\"${response.toString().replace("\"", "\\\"").replace("\n", "\\n")}\"}")
                      } catch (e: Exception) {
                          Log.e("HEAVYNET_DAEMON", "NATIVE INIT CRASH: ${e.message}")
                          File(outputPath).writeText("{\"status\":\"error\", \"message\":\"${e.message}\"}")
                      }
                  }
                  return START_NOT_STICKY
              }
              override fun onDestroy() { 
                  super.onDestroy()
                  activeConversation?.close()
                  engine?.close()
                  hardwareExecutor.shutdown() 
              }
              override fun onBind(intent: Intent?): IBinder? = null
          }
          KOTLIN_EOF
      - name: Patch Manifest
        run: |
          sed -i 's|<application|<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<application|g' ${{ env.MANIFEST_PATH }}
          sed -i 's|</application>|<service android:name="com.google.ai.edge.gallery.HeadlessNpuService" android:exported="true" android:process=":npu_worker" />\n</application>|g' ${{ env.MANIFEST_PATH }}
      - name: Decode Keystore to Absolute Workspace
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > $GITHUB_WORKSPACE/npu_master.jks
      - name: Build APK with Absolute Path Signature
        run: |
          cd ${{ env.GRADLE_DIR }}
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/npu_master.jks -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASS }} -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASS }} --no-daemon -q
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: "**/*.apk"
