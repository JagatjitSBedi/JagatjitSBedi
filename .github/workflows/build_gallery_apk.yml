name: Build Android APK
on:
  workflow_dispatch:
  push:
    paths:
      - 'agent_workspaces/ai_edge_gallery/gallery/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Environment
        uses: gradle/actions/setup-gradle@v3

      - name: Dynamically Generate Wrapper and Build APK
        run: |
          # Find the exact folder containing the root build.gradle or settings.gradle
          BUILD_ROOT=$(find . -name "build.gradle" -o -name "settings.gradle" -o -name "build.gradle.kts" | head -n 1)
          if [ -z "$BUILD_ROOT" ]; then
            echo "::error::Could not locate build.gradle or settings.gradle in the repository."
            exit 1
          fi
          
          BUILD_DIR=$(dirname "$BUILD_ROOT")
          echo "Found Project Root at: $BUILD_DIR"
          
          cd "$BUILD_DIR"
          
          # Generate the wrapper locally in the runner
          gradle wrapper
          
          # Ensure execution permissions and build
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gallery-app-debug
          path: agent_workspaces/ai_edge_gallery/gallery/Android/**/app/build/outputs/apk/debug/*.apk
