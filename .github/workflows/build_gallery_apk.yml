name: Build Gallery APK
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: git clone -q https://github.com/google-ai-edge/gallery.git upstream_repo
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Setup Environment Variables
        run: |
          # Deterministic path mapping
          GRADLE_DIR="upstream_repo/Android/src"
          echo "GRADLE_DIR=$GRADLE_DIR" >> "$GITHUB_ENV"
          SERVICE_DIR="$GRADLE_DIR/app/src/main/java/com/google/ai/edge/gallery"
          echo "SERVICE_DIR=$SERVICE_DIR" >> "$GITHUB_ENV"
          MANIFEST_PATH="$GRADLE_DIR/app/src/main/AndroidManifest.xml"
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> "$GITHUB_ENV"
      - name: Inject Service
        run: |
          cat << 'KOTLIN_EOF' > ${{ env.SERVICE_DIR }}/HeadlessNpuService.kt
          package com.google.ai.edge.gallery
          import android.app.Service
          import android.content.Intent
          import android.os.IBinder
          import android.util.Log
          import com.google.ai.edge.litertlm.*
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.launch
          import java.io.File
          
          class HeadlessNpuService : Service() {
              private var engine: Engine? = null
              
              override fun onCreate() {
                  super.onCreate()
                  Log.i("HEAVYNET_DAEMON", "Service Created.")
                  val modelPath = "/sdcard/Android/data/com.google.aiedge.gallery/files/Gemma_4_E4B_it/9695417f248178c63a9f318c6e0c56cb917cb837/gemma-4-E4B-it.litertlm"
                  
                  if (!File(modelPath).exists()) {
                      Log.e("HEAVYNET_DAEMON", "FATAL: Model not found at $modelPath")
                      return
                  }
                  
                  try {
                      val config = EngineConfig(modelPath = modelPath)
                      engine = Engine(config)
                      engine?.initialize()
                      Log.i("HEAVYNET_DAEMON", "Engine Ready.")
                  } catch (e: Exception) {
                      Log.e("HEAVYNET_DAEMON", "Init Failed: ${e.message}")
                  }
              }
              
              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val prompt = intent?.getStringExtra("HEAVYNET_PROMPT") ?: return START_NOT_STICKY
                  CoroutineScope(Dispatchers.IO).launch {
                      try {
                          if (engine == null) {
                              Log.e("HEAVYNET_OUTPUT", "{\"status\":\"error\", \"message\":\"Engine null\"}")
                              return@launch
                          }
                          val conversation = engine!!.createConversation()
                          val output = conversation.sendMessage(prompt)
                          val safeOutput = output.toString().replace("\"", "\\\"").replace("\n", "\\n")
                          Log.i("HEAVYNET_OUTPUT", "{\"status\":\"success\", \"response\":\"$safeOutput\"}")
                          conversation.close()
                      } catch (e: Exception) {
                          Log.e("HEAVYNET_OUTPUT", "{\"status\":\"error\", \"message\":\"${e.message}\"}")
                      }
                  }
                  return START_NOT_STICKY
              }
              
              override fun onDestroy() {
                  super.onDestroy()
                  engine?.close()
                  Log.i("HEAVYNET_DAEMON", "Service Destroyed. Hardware memory released.")
              }
              
              override fun onBind(intent: Intent?): IBinder? = null
          }
          KOTLIN_EOF
      - name: Patch Manifest
        run: |
          # Use fully qualified class name to eliminate namespace ambiguities
          sed -i 's|</application>|<service android:name="com.google.ai.edge.gallery.HeadlessNpuService" android:exported="true" />\n</application>|g' ${{ env.MANIFEST_PATH }}
      - name: Build APK
        run: |
          cd ${{ env.GRADLE_DIR }}
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: "**/*.apk"
