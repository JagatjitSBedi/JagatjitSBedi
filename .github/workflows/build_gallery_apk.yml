name: Build Android APK
on:
  workflow_dispatch:
  push:
    paths:
      - 'agent_workspaces/ai_edge_gallery/gallery/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dynamically Locate and Build APK
        run: |
          # Find the exact folder containing the Gradle wrapper
          GRADLE_PATH=$(find . -name "gradlew" -type f | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
            echo "::error::Could not locate gradlew in the repository."
            exit 1
          fi
          
          BUILD_DIR=$(dirname "$GRADLE_PATH")
          echo "Found Gradle root at: $BUILD_DIR"
          
          cd "$BUILD_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gallery-app-debug
          path: agent_workspaces/ai_edge_gallery/gallery/Android/**/app/build/outputs/apk/debug/*.apk
