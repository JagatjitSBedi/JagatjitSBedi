name: Build Gallery APK
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: git clone -q https://github.com/google-ai-edge/gallery.git upstream_repo
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Setup Environment Variables
        run: |
          GRADLE_DIR="upstream_repo/Android/src"
          echo "GRADLE_DIR=$GRADLE_DIR" >> "$GITHUB_ENV"
          SERVICE_DIR="$GRADLE_DIR/app/src/main/java/com/google/ai/edge/gallery"
          echo "SERVICE_DIR=$SERVICE_DIR" >> "$GITHUB_ENV"
          MANIFEST_PATH="$GRADLE_DIR/app/src/main/AndroidManifest.xml"
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> "$GITHUB_ENV"
      - name: Inject Lazy-Init Service
        run: |
          cat << 'KOTLIN_EOF' > ${{ env.SERVICE_DIR }}/HeadlessNpuService.kt
          package com.google.ai.edge.gallery
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.os.IBinder
          import android.util.Log
          import androidx.core.app.NotificationCompat
          import com.google.ai.edge.litertlm.*
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.sync.Mutex
          import kotlinx.coroutines.sync.withLock
          import java.io.File
          
          class HeadlessNpuService : Service() {
              private var engine: Engine? = null
              private val engineMutex = Mutex()
              private val outputPath = "/sdcard/Android/data/com.google.aiedge.gallery/files/omni_response.json"
              private val modelPath = "/sdcard/Android/data/com.google.aiedge.gallery/files/Gemma_4_E4B_it/9695417f248178c63a9f318c6e0c56cb917cb837/gemma-4-E4B-it.litertlm"
              
              override fun onCreate() {
                  super.onCreate()
                  Log.i("HEAVYNET_DAEMON", "Service Created. Elevating to Lazy IPC Daemon...")
                  
                  val channelId = "npu_daemon_channel"
                  val channel = NotificationChannel(channelId, "NPU Daemon", NotificationManager.IMPORTANCE_LOW)
                  val manager = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  manager.createNotificationChannel(channel)
                  
                  val notification = NotificationCompat.Builder(this, channelId)
                      .setContentTitle("HeavyNet IPC Daemon")
                      .setContentText("Exynos GPU Bound. Lazy Init Active.")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .build()
                      
                  startForeground(1337, notification)
                  // DELIBERATELY NO ASYNC EXECUTION HERE TO PREVENT RACE CONDITIONS
              }
              
              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val prompt = intent?.getStringExtra("HEAVYNET_PROMPT") ?: return START_NOT_STICKY
                  CoroutineScope(Dispatchers.IO).launch {
                      engineMutex.withLock {
                          try {
                              File(outputPath).delete()
                              
                              // LAZY INITIALIZATION BLOCK
                              if (engine == null) {
                                  Log.i("HEAVYNET_DAEMON", "Engine uninitialized. Forcing Mali-G77 Hardware Map (Cold Boot)...")
                                  if (!File(modelPath).exists()) {
                                      throw Exception("Tensor file missing at \$modelPath")
                                  }
                                  val config = EngineConfig(
                                      modelPath = modelPath,
                                      backend = Backend.GPU(),
                                      maxNumTokens = 1024 
                                  )
                                  val tempEngine = Engine(config)
                                  tempEngine.initialize()
                                  engine = tempEngine
                                  Log.i("HEAVYNET_DAEMON", "Cold Boot Complete. Hardware Locks Released.")
                              }
                              
                              Log.i("HEAVYNET_DAEMON", "Lock Acquired: Igniting Accelerated Inference.")
                              val conversation = engine!!.createConversation()
                              val output = conversation.sendMessage(prompt)
                              val safeOutput = output.toString().replace("\"", "\\\"").replace("\n", "\\n")
                              
                              File(outputPath).writeText("{\"status\":\"success\", \"response\":\"\$safeOutput\"}")
                              Log.i("HEAVYNET_DAEMON", "Inference Complete. Payload safely written to disk.")
                              
                              conversation.close()
                          } catch (e: Exception) {
                              File(outputPath).writeText("{\"status\":\"error\", \"message\":\"\${e.message}\"}")
                              Log.e("HEAVYNET_DAEMON", "Inference Failed: \${e.message}")
                          }
                      }
                  }
                  return START_NOT_STICKY
              }
              
              override fun onDestroy() {
                  super.onDestroy()
                  engine?.close()
              }
              
              override fun onBind(intent: Intent?): IBinder? = null
          }
          KOTLIN_EOF
      - name: Patch Manifest
        run: |
          sed -i 's|<application|<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<application|g' ${{ env.MANIFEST_PATH }}
          sed -i 's|</application>|<service android:name="com.google.ai.edge.gallery.HeadlessNpuService" android:exported="true" />\n</application>|g' ${{ env.MANIFEST_PATH }}
      - name: Build APK
        run: |
          cd ${{ env.GRADLE_DIR }}
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: "**/*.apk"
