name: Build Gallery APK
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: git clone -q https://github.com/google-ai-edge/gallery.git upstream_repo
      - name: Analyze LiteRT API Architecture
        run: |
          echo "--- SCANNING FOR LLM ENGINE INITIALIZATION ---"
          # Search for any import related to the LiteRT engine or inference
          grep -rnE "import com\.google\.ai\.edge\.litertlm\..*Engine" upstream_repo/Android/src/app/src/main/java || true
          grep -rnE "import com\.google\.ai\.edge\.litertlm\..*Inference" upstream_repo/Android/src/app/src/main/java || true
          
          echo "--- SCANNING LlmModelInstance.java ---"
          # Extract the initialization block from Google's own implementation
          cat $(find upstream_repo -name LlmModelInstance.java | head -n 1) || echo "File not found"
          
          echo "--- SCANNING FOR LLM RESPONSE GENERATION ---"
          # Search for the exact method used to generate text
          grep -rn "generateResponse(" upstream_repo/Android/src/app/src/main/java || true
          grep -rn "\.generate(" upstream_repo/Android/src/app/src/main/java || true
          
          # Force fail to prevent the rest of the build from wasting time, as we only need the logs
          exit 1
