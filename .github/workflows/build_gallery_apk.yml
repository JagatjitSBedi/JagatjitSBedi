name: Build Android APK
on:
  workflow_dispatch:
  push:
    paths:
      - 'agent_workspaces/ai_edge_gallery/gallery/Android/src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent_workspaces/ai_edge_gallery/gallery/Android/src
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build APK (assembleDebug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gallery-app-debug
          path: agent_workspaces/ai_edge_gallery/gallery/Android/src/app/build/outputs/apk/debug/*.apk
