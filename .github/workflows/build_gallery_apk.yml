name: Build Gallery APK
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: git clone -q https://github.com/google-ai-edge/gallery.git upstream_repo
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Setup Environment Variables
        run: |
          GRADLE_DIR=$(find upstream_repo -name gradlew -exec dirname {} \; | head -n 1)
          echo "GRADLE_DIR=$GRADLE_DIR" >> "$GITHUB_ENV"
          SERVICE_DIR=$(find upstream_repo -path "*/com/google/ai/edge/gallery" -type d | head -n 1)
          echo "SERVICE_DIR=$SERVICE_DIR" >> "$GITHUB_ENV"
          MANIFEST_PATH=$(find upstream_repo -name AndroidManifest.xml | grep src/main | head -n 1)
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> "$GITHUB_ENV"
      - name: Inject Service
        run: |
          cat << 'KOTLIN_EOF' > ${{ env.SERVICE_DIR }}/HeadlessNpuService.kt
          package com.google.ai.edge.gallery; import android.app.Service; import android.content.Intent; import android.os.IBinder; import android.util.Log; import com.google.mediapipe.tasks.genai.llminference.LlmInference; import kotlinx.coroutines.CoroutineScope; import kotlinx.coroutines.Dispatchers; import kotlinx.coroutines.launch; import java.io.File; class HeadlessNpuService : Service() { private var llmInference: LlmInference? = null; override fun onCreate() { super.onCreate(); Log.i("HEAVYNET_DAEMON", "Service Created."); val modelPath = "/sdcard/Android/data/com.google.aiedge.gallery/files/Gemma_4_E4B_it/9695417f248178c63a9f318c6e0c56cb917cb837/gemma-4-E4B-it.litertlm"; if (!File(modelPath).exists()) { Log.e("HEAVYNET_DAEMON", "FATAL: Model not found"); return }; try { val options = LlmInference.LlmInferenceOptions.builder().setModelPath(modelPath).setMaxTokens(1024).setTemperature(0.1f).build(); llmInference = LlmInference.createFromOptions(applicationContext, options); Log.i("HEAVYNET_DAEMON", "Engine Ready.") } catch (e: Exception) { Log.e("HEAVYNET_DAEMON", "Init Failed: ${e.message}") } }; override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int { val prompt = intent?.getStringExtra("HEAVYNET_PROMPT") ?: return START_NOT_STICKY; CoroutineScope(Dispatchers.IO).launch { try { if (llmInference == null) { Log.e("HEAVYNET_OUTPUT", "Engine null"); return@launch }; val output = llmInference?.generateResponse(prompt); val safeOutput = output?.replace("\"", "\\\"")?.replace("\n", "\\n"); Log.i("HEAVYNET_OUTPUT", "{\"status\":\"success\", \"response\":\"$safeOutput\"}") } catch (e: Exception) { Log.e("HEAVYNET_OUTPUT", "{\"status\":\"error\", \"message\":\"${e.message}\"}") } }; return START_NOT_STICKY }; override fun onDestroy() { super.onDestroy(); llmInference?.close() }; override fun onBind(intent: Intent?): IBinder? = null }
          KOTLIN_EOF
      - name: Patch Manifest
        run: |
          sed -i 's|</application>|<service android:name=".HeadlessNpuService" android:exported="true" />\n</application>|g' ${{ env.MANIFEST_PATH }}
      - name: Build APK
        run: |
          cd ${{ env.GRADLE_DIR }}
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: "**/*.apk"
