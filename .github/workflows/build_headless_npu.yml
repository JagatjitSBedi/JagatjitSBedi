name: Build Headless NPU Worker
on:
  workflow_dispatch:
  push:
    paths:
      - 'uds_worker/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Android NDK (r25c)
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          
      - name: Cross-Compile C++ for Exynos aarch64
        run: |
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++ \
          -O3 -std=c++17 -pie -fPIE \
          uds_worker/main.cpp \
          -o npu_worker
          
      - name: Upload Native Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: npu_worker_arm64
          path: npu_worker
