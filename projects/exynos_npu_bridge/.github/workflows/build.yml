name: DSOA NPU Bridge Forge
on: [push]
jobs:
  build-ndk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b
    - name: Compile Exynos C++ Bridge
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-33 ..
        make
    - name: Upload Compiled NDK Library
      uses: actions/upload-artifact@v4
      with:
        name: exynos-bridge-arm64-v8a
        path: build/libexynos_bridge.so
